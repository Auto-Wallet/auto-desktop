name: Release

# Push a `v*` tag (e.g. `v0.1.0`) to build standalone clients and publish them to
# the matching GitHub Release:
#   - macOS : signed + notarized .dmg for Apple Silicon (aarch64) and Intel (x64)
#   - Windows: standalone .zip (WebView2 runtime is bootstrapped from the system)
# Asset names embed the OS + arch so they are unambiguous on the release page.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3.14"

jobs:
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Bun
        shell: bash
        run: |
          set -euxo pipefail
          for i in 1 2 3 4 5; do
            if npm install -g "bun@${BUN_VERSION}"; then
              bun --version
              exit 0
            fi
            sleep $((i * 10))
          done
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          set -euxo pipefail
          # The auto-wallet-core SDK is a git submodule consumed via `link:`.
          # Register it as a bun link, then install so node_modules resolves it.
          (cd auto-wallet-core && bun link)
          bun install
          test -e node_modules/auto-wallet-core/package.json

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12

          curl -sL -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -sL -o $RUNNER_TEMP/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import $RUNNER_TEMP/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Derive the Developer ID Application identity and hand it to the Tauri bundler.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application signing identity found in the imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          case "$IDENTITY" in
            Developer\ ID\ Application:*) ;;
            *)
              echo "::error::Expected a Developer ID Application identity, got: $IDENTITY"
              exit 1
              ;;
          esac
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build signed + notarized DMG
        env:
          # Signing identity exported above; notarization creds from repo secrets.
          APPLE_KEYCHAIN: ${{ runner.temp }}/build.keychain-db
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          security unlock-keychain -p "ci" "$APPLE_KEYCHAIN"
          bun run tauri build --target ${{ matrix.target }} --bundles dmg -v

      - name: Re-sign and repackage macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          ORIGINAL_DMG=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          WORK_DIR="$RUNNER_TEMP/macos-repackage-${{ matrix.arch }}"
          MOUNT_DIR="$WORK_DIR/mount"
          APP_DIR="$WORK_DIR/app"
          DMG_STAGE="$WORK_DIR/dmg-stage"
          APP_ZIP="$WORK_DIR/AutoDesktop.zip"

          rm -rf "$WORK_DIR"
          mkdir -p "$MOUNT_DIR" "$APP_DIR" "$DMG_STAGE"
          hdiutil attach "$ORIGINAL_DMG" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          trap 'hdiutil detach "$MOUNT_DIR" || true' EXIT

          ditto "$MOUNT_DIR/AutoDesktop.app" "$APP_DIR/AutoDesktop.app"
          hdiutil detach "$MOUNT_DIR"
          trap - EXIT

          # Drop Tauri's stapled ticket and produce a fresh system-codesign signature.
          rm -f "$APP_DIR/AutoDesktop.app/Contents/CodeResources"
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements src-tauri/Entitlements.plist \
            "$APP_DIR/AutoDesktop.app"

          ditto -c -k --keepParent "$APP_DIR/AutoDesktop.app" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_DIR/AutoDesktop.app"
          xcrun stapler validate "$APP_DIR/AutoDesktop.app"
          spctl -a -vvv -t execute "$APP_DIR/AutoDesktop.app"

          ditto "$APP_DIR/AutoDesktop.app" "$DMG_STAGE/AutoDesktop.app"
          ln -s /Applications "$DMG_STAGE/Applications"
          rm -f "$ORIGINAL_DMG"
          hdiutil create -volname "AutoDesktop" \
            -srcfolder "$DMG_STAGE" \
            -ov \
            -format UDZO \
            "$ORIGINAL_DMG"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$ORIGINAL_DMG"

      - name: Verify macOS DMG and app notarization
        run: |
          set -euxo pipefail
          DMG=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)

          # The file we upload must be mountable as-is. Do this before any staging
          # copy so a broken DMG cannot reach the release page.
          hdiutil verify "$DMG"
          hdiutil imageinfo "$DMG"

          MOUNT_DIR="$RUNNER_TEMP/dmg-mount"
          mkdir -p "$MOUNT_DIR"
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          trap 'hdiutil detach "$MOUNT_DIR" || true' EXIT
          APP="$MOUNT_DIR/AutoDesktop.app"

          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign -dv --verbose=4 "$APP" 2>&1 | tee "$RUNNER_TEMP/codesign.txt"
          grep -q "Authority=Developer ID Application" "$RUNNER_TEMP/codesign.txt"
          grep -q "Runtime Version=" "$RUNNER_TEMP/codesign.txt"

          spctl -a -vvv -t execute "$APP"
          xcrun stapler validate "$APP"

      - name: Stage artifact
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          mkdir -p dist
          cp "$SRC" "dist/AutoDesktop_${VERSION}_macos_${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Bun
        shell: bash
        run: |
          set -euxo pipefail
          for i in 1 2 3 4 5; do
            if npm install -g "bun@${BUN_VERSION}"; then
              bun --version
              exit 0
            fi
            sleep $((i * 10))
          done
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          (cd auto-wallet-core && bun link)
          bun install
          test -e node_modules/auto-wallet-core/package.json

      # No installer — build just the standalone executable for a zip.
      - name: Build executable
        run: bun run tauri build --no-bundle

      - name: Package zip
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist staging
          cp src-tauri/target/release/auto-desktop.exe "staging/AutoDesktop.exe"
          7z a "dist/AutoDesktop_${VERSION}_windows_x64.zip" ./staging/*

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
