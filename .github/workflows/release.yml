name: Release

# Push a `v*` tag (e.g. `v0.1.0`) to build standalone clients for every OS and
# publish them to the matching GitHub Release:
#   - macOS : signed + notarized .dmg for Apple Silicon (aarch64) and Intel (x64)
#   - Windows: standalone .zip (WebView2 runtime is bootstrapped from the system)
#   - Linux : .deb (amd64)
# Asset names embed the OS + arch so they are unambiguous on the release page.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          set -euxo pipefail
          # The auto-wallet-core SDK is a git submodule consumed via `link:`.
          # Register it as a bun link, then install so node_modules resolves it.
          (cd auto-wallet-core && bun link)
          bun install
          test -e node_modules/auto-wallet-core/package.json

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12

          curl -sL -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -sL -o $RUNNER_TEMP/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import $RUNNER_TEMP/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Derive the Developer ID Application identity and hand it to the Tauri bundler.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build signed + notarized DMG
        env:
          # Signing identity exported above; notarization creds from repo secrets.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Stage artifact
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          mkdir -p dist
          cp "$SRC" "dist/AutoDesktop_${VERSION}_macos_${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          (cd auto-wallet-core && bun link)
          bun install
          test -e node_modules/auto-wallet-core/package.json

      # No installer — build just the standalone executable for a zip.
      - name: Build executable
        run: bun run tauri build --no-bundle

      - name: Package zip
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist staging
          cp src-tauri/target/release/auto-desktop.exe "staging/AutoDesktop.exe"
          7z a "dist/AutoDesktop_${VERSION}_windows_x64.zip" ./staging/*

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-linux:
    name: Linux (amd64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: |
          set -euxo pipefail
          (cd auto-wallet-core && bun link)
          bun install
          test -e node_modules/auto-wallet-core/package.json

      - name: Build .deb
        run: bun run tauri build --bundles deb

      - name: Stage artifact
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          mkdir -p dist
          cp "$SRC" "dist/AutoDesktop_${VERSION}_linux_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*.deb
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
