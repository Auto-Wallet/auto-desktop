name: Release

# Push a `v*` tag (e.g. `v0.1.0`) to build standalone clients and publish them to
# the matching GitHub Release:
#   - macOS : signed + notarized .dmg for Apple Silicon (aarch64) and Intel (x64)
#   - Windows: standalone .zip plus an NSIS updater installer
# Asset names embed the OS + arch so they are unambiguous on the release page.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BUN_VERSION: "1.3.14"

jobs:
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
            runner: macos-26
          - target: x86_64-apple-darwin
            arch: x64
            runner: macos-26-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Bun
        shell: bash
        run: |
          set -euxo pipefail
          for i in 1 2 3 4 5; do
            if npm install -g "bun@${BUN_VERSION}"; then
              bun --version
              exit 0
            fi
            sleep $((i * 10))
          done
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          set -euxo pipefail
          # The auto-wallet-core SDK is a git submodule consumed via `link:`.
          # Register it as a bun link, then install so node_modules resolves it.
          (cd auto-wallet-core && bun link)
          bun install
          test -e node_modules/auto-wallet-core/package.json

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euxo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db

          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12

          curl -sL -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer
          curl -sL -o $RUNNER_TEMP/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security import $RUNNER_TEMP/DeveloperIDG2CA.cer -k "$KEYCHAIN_PATH" -T /usr/bin/codesign

          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "ci" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Derive the Developer ID Application identity and hand it to the Tauri bundler.
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application signing identity found in the imported certificate."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          case "$IDENTITY" in
            Developer\ ID\ Application:*) ;;
            *)
              echo "::error::Expected a Developer ID Application identity, got: $IDENTITY"
              exit 1
              ;;
          esac
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build signed + notarized macOS bundles
        env:
          # Signing identity exported above; notarization creds from repo secrets.
          APPLE_KEYCHAIN: ${{ runner.temp }}/build.keychain-db
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ZAPPER_APIKEY: ${{ secrets.ZAPPER_APIKEY }}
        run: |
          set -euxo pipefail
          security unlock-keychain -p "ci" "$APPLE_KEYCHAIN"
          # The updater plugin creates macOS update artifacts only for the
          # `app` bundle target; `dmg` is still built for manual installs.
          bun run tauri build --target ${{ matrix.target }} --bundles app,dmg -v

      - name: Re-sign and repackage macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail
          ORIGINAL_DMG=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          WORK_DIR="$RUNNER_TEMP/macos-repackage-${{ matrix.arch }}"
          MOUNT_DIR="$WORK_DIR/mount"
          APP_DIR="$WORK_DIR/app"
          DMG_STAGE="$WORK_DIR/dmg-stage"
          APP_ZIP="$WORK_DIR/AutoDesktop.zip"

          rm -rf "$WORK_DIR"
          mkdir -p "$MOUNT_DIR" "$APP_DIR" "$DMG_STAGE"
          hdiutil attach "$ORIGINAL_DMG" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          trap 'hdiutil detach "$MOUNT_DIR" || true' EXIT

          ditto "$MOUNT_DIR/AutoDesktop.app" "$APP_DIR/AutoDesktop.app"
          hdiutil detach "$MOUNT_DIR"
          trap - EXIT

          # Drop Tauri's stapled ticket and produce a fresh system-codesign signature.
          rm -f "$APP_DIR/AutoDesktop.app/Contents/CodeResources"
          codesign --force --deep --options runtime --timestamp \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements src-tauri/Entitlements.plist \
            "$APP_DIR/AutoDesktop.app"

          ditto -c -k --keepParent "$APP_DIR/AutoDesktop.app" "$APP_ZIP"
          xcrun notarytool submit "$APP_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_DIR/AutoDesktop.app"
          xcrun stapler validate "$APP_DIR/AutoDesktop.app"
          spctl -a -vvv -t execute "$APP_DIR/AutoDesktop.app"

          ditto "$APP_DIR/AutoDesktop.app" "$DMG_STAGE/AutoDesktop.app"
          ln -s /Applications "$DMG_STAGE/Applications"
          rm -f "$ORIGINAL_DMG"
          hdiutil create -volname "AutoDesktop" \
            -srcfolder "$DMG_STAGE" \
            -ov \
            -format UDZO \
            "$ORIGINAL_DMG"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$ORIGINAL_DMG"

      - name: Verify macOS DMG and app notarization
        run: |
          set -euxo pipefail
          DMG=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)

          # The file we upload must be mountable as-is. Do this before any staging
          # copy so a broken DMG cannot reach the release page.
          hdiutil verify "$DMG"
          hdiutil imageinfo "$DMG"

          MOUNT_DIR="$RUNNER_TEMP/dmg-mount"
          mkdir -p "$MOUNT_DIR"
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse -readonly
          trap 'hdiutil detach "$MOUNT_DIR" || true' EXIT
          APP="$MOUNT_DIR/AutoDesktop.app"
          INSTALL_COPY="$RUNNER_TEMP/AutoDesktop-installed-${{ matrix.arch }}.app"

          # Gatekeeper checks the copied app, not the bundle while it is still on
          # the read-only DMG mount. Verify the same path users get after drag-install.
          rm -rf "$INSTALL_COPY"
          ditto "$APP" "$INSTALL_COPY"

          codesign --verify --deep --strict --verbose=2 "$INSTALL_COPY"
          codesign -dv --verbose=4 "$INSTALL_COPY" 2>&1 | tee "$RUNNER_TEMP/codesign.txt"
          grep -q "Authority=Developer ID Application" "$RUNNER_TEMP/codesign.txt"
          grep -q "Runtime Version=" "$RUNNER_TEMP/codesign.txt"

          spctl -a -vvv -t execute "$INSTALL_COPY"
          xcrun stapler validate "$INSTALL_COPY"

      - name: Stage artifact
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg | head -1)
          mkdir -p dist
          cp "$SRC" "dist/AutoDesktop_${VERSION}_macos_${{ matrix.arch }}.dmg"
          UPDATER=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type f -name "*.app.tar.gz" | sort | head -1)
          if [ -z "$UPDATER" ]; then
            echo "::error::Missing macOS updater artifact. The macOS release build must produce bundle/macos/*.app.tar.gz."
            find "src-tauri/target/${{ matrix.target }}/release/bundle" -maxdepth 3 -type f | sort
            exit 1
          fi
          if [ ! -f "$UPDATER.sig" ]; then
            echo "::error::Missing updater signature for $UPDATER. Check TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
            exit 1
          fi
          PLATFORM="darwin-${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x86_64' }}"
          ASSET="AutoDesktop_${VERSION}_${PLATFORM}.app.tar.gz"
          cp "$UPDATER" "dist/$ASSET"
          cp "$UPDATER.sig" "dist/$ASSET.sig"
          SIG=$(cat "$UPDATER.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="$VERSION" PLATFORM="$PLATFORM" ASSET="$ASSET" SIG="$SIG" PUB_DATE="$PUB_DATE" node -e '
            const fs = require("fs");
            const version = process.env.VERSION;
            const platform = process.env.PLATFORM;
            const asset = process.env.ASSET;
            const tag = process.env.GITHUB_REF_NAME;
            const out = {
              version,
              notes: "",
              pub_date: process.env.PUB_DATE,
              platforms: {
                [platform]: {
                  signature: process.env.SIG.trim(),
                  url: `https://github.com/Auto-Wallet/auto-desktop/releases/download/${tag}/${asset}`
                }
              }
            };
            fs.writeFileSync(`dist/latest-${platform}.json`, JSON.stringify(out, null, 2));
          '

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Bun
        shell: bash
        run: |
          set -euxo pipefail
          for i in 1 2 3 4 5; do
            if npm install -g "bun@${BUN_VERSION}"; then
              bun --version
              exit 0
            fi
            sleep $((i * 10))
          done
          exit 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          (cd auto-wallet-core && bun link)
          bun install
          test -e node_modules/auto-wallet-core/package.json

      - name: Build executable + NSIS updater installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ZAPPER_APIKEY: ${{ secrets.ZAPPER_APIKEY }}
        run: bun run tauri build --bundles nsis

      - name: Stage artifacts
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist staging
          cp src-tauri/target/release/auto-desktop.exe "staging/AutoDesktop.exe"
          7z a "dist/AutoDesktop_${VERSION}_windows_x64.zip" ./staging/*
          INSTALLER=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          ASSET="AutoDesktop_${VERSION}_windows_x86_64_setup.exe"
          cp "$INSTALLER" "dist/$ASSET"
          cp "$INSTALLER.sig" "dist/$ASSET.sig"
          SIG=$(cat "$INSTALLER.sig")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="$VERSION" PLATFORM="windows-x86_64" ASSET="$ASSET" SIG="$SIG" PUB_DATE="$PUB_DATE" node -e '
            const fs = require("fs");
            const version = process.env.VERSION;
            const platform = process.env.PLATFORM;
            const asset = process.env.ASSET;
            const tag = process.env.GITHUB_REF_NAME;
            const out = {
              version,
              notes: "",
              pub_date: process.env.PUB_DATE,
              platforms: {
                [platform]: {
                  signature: process.env.SIG.trim(),
                  url: `https://github.com/Auto-Wallet/auto-desktop/releases/download/${tag}/${asset}`
                }
              }
            };
            fs.writeFileSync(`dist/latest-${platform}.json`, JSON.stringify(out, null, 2));
          '

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create updater manifest
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          node -e '
            const fs = require("fs");
            const version = process.env.VERSION.replace(/^v/, "");
            const out = { version, notes: "", pub_date: new Date().toISOString(), platforms: {} };
            for (const file of fs.readdirSync("dist").filter((f) => /^latest-.*\.json$/.test(f))) {
              const data = JSON.parse(fs.readFileSync(`dist/${file}`, "utf8"));
              Object.assign(out.platforms, data.platforms || {});
            }
            fs.writeFileSync("dist/latest.json", JSON.stringify(out, null, 2));
          '
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.tar.gz
            dist/*.exe
            dist/*.sig
            dist/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
