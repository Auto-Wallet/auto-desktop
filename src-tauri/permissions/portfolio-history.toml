# Permissions for local portfolio history snapshots. Granted only to the trusted
# shell webview; remote dApps must never be able to read or write wallet history.
[[permission]]
identifier = "allow-get-portfolio-history"
description = "Allow the shell to read locally stored portfolio value snapshots."
commands.allow = ["get_portfolio_history"]

[[permission]]
identifier = "allow-record-portfolio-snapshot"
description = "Allow the shell to append or update a local portfolio value snapshot."
commands.allow = ["record_portfolio_snapshot"]

[[permission]]
identifier = "allow-sync-activity-receipts"
description = "Allow the shell to refresh locally stored activity receipt status."
commands.allow = ["sync_activity_receipts"]
