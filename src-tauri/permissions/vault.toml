# Permissions for the key-vault commands. Granted ONLY to the trusted "shell"
# webview (capabilities/default.json) — NEVER to the dapp webview. The user's
# password is typed into the shell UI; a dApp must never be able to create,
# unlock, read, or switch the wallet. Private keys never leave the Rust backend.
[[permission]]
identifier = "allow-vault-status"
description = "Allow the shell to query whether a vault exists / is unlocked and the visible address."
commands.allow = ["vault_status"]

[[permission]]
identifier = "allow-create-vault"
description = "Allow the shell to create a new encrypted wallet (generate + seal a mnemonic)."
commands.allow = ["create_vault"]

[[permission]]
identifier = "allow-import-vault"
description = "Allow the shell to import a wallet from a recovery phrase and seal it."
commands.allow = ["import_vault"]

[[permission]]
identifier = "allow-import-private-key"
description = "Allow the shell to import a wallet from a single raw private key and seal it."
commands.allow = ["import_private_key"]

[[permission]]
identifier = "allow-export-wallet-secret"
description = "Allow the shell to export a software wallet secret after password confirmation."
commands.allow = ["export_wallet_secret"]

[[permission]]
identifier = "allow-reset-vault"
description = "Allow the shell to reset the wallet (delete the keystore) for the forgot-password flow."
commands.allow = ["reset_vault"]

[[permission]]
identifier = "allow-ledger-addresses"
description = "Allow the shell to list addresses from a connected Ledger device for the onboarding picker."
commands.allow = ["ledger_addresses"]

[[permission]]
identifier = "allow-connect-ledger"
description = "Allow the shell to connect a Ledger account as the (no-password) wallet."
commands.allow = ["connect_ledger"]

[[permission]]
identifier = "allow-unlock-vault"
description = "Allow the shell to unlock the on-disk vault with the user's password."
commands.allow = ["unlock_vault"]

[[permission]]
identifier = "allow-lock-vault"
description = "Allow the shell to lock the wallet (drop decrypted keys from memory)."
commands.allow = ["lock_vault"]

[[permission]]
identifier = "allow-select-account"
description = "Allow the shell to switch the active HD account and push accountsChanged."
commands.allow = ["select_account"]

[[permission]]
identifier = "allow-expose-dapp-account"
description = "Allow the shell to expose a public watch-only address to dApps without signing."
commands.allow = ["expose_dapp_account"]

[[permission]]
identifier = "allow-add-account"
description = "Allow the shell to derive and persist the next HD account."
commands.allow = ["add_account"]

[[permission]]
identifier = "allow-rename-wallet"
description = "Allow the shell to rename a wallet (plaintext label only)."
commands.allow = ["rename_wallet"]

[[permission]]
identifier = "allow-delete-wallet"
description = "Allow the shell to delete a single wallet's keystore."
commands.allow = ["delete_wallet"]
